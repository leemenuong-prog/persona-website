<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" fill="#18181C" font-family="-apple-system, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#1a2a1e" flood-opacity="0.05"/>
    </filter>
    <filter id="soft2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="9" flood-color="#16161a" flood-opacity="0.06"/>
    </filter>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,1 L9,5 L0,9" fill="none" stroke="#2A6346" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .h1{ font-weight:800; stroke:#18181C; stroke-width:0.7; }
      .h2{ font-weight:800; stroke:#18181C; stroke-width:0.55; }
      .b { font-weight:800; stroke:#18181C; stroke-width:0.32; }
      .acc{ fill:#2A6346; }
      .accb{ fill:#2A6346; font-weight:800; stroke:#2A6346; stroke-width:0.4; }
      .gray{ fill:#76767C; }
      .faint{ fill:#9A9AA0; }
    </style>
    <symbol id="pear" viewBox="0 0 100 120">
      <ellipse cx="65" cy="25" rx="11" ry="6" fill="#7C9A45" transform="rotate(-32 65 25)"/>
      <path d="M50,30 C50,22 52,17 57,13" fill="none" stroke="#6E7B3A" stroke-width="4.6" stroke-linecap="round"/>
      <ellipse cx="50" cy="48" rx="18" ry="21" fill="#A8B854"/>
      <ellipse cx="50" cy="84" rx="34" ry="30" fill="#A8B854"/>
    </symbol>
  </defs>

  <!-- ground -->
  <rect width="1280" height="720" fill="#F5F5F7"/>

  <!-- ===== header ===== -->
  <use href="#pear" x="58" y="40" width="30" height="34"/>
  <text x="104" y="66" font-size="28" class="b">Pears</text>
  <text x="1216" y="60" font-size="17" class="gray" text-anchor="end" letter-spacing="0.3">示范与学习</text>

  <!-- ===== headline ===== -->
  <text x="62" y="142" font-size="42" class="h1" letter-spacing="-0.5">每一次点击与切换，都在告诉它什么值得自动化。</text>

  <!-- ===== LEFT CARD (cool grey-green) ===== -->
  <rect x="64" y="188" width="556" height="484" rx="22" fill="#E0E8E3" filter="url(#soft)"/>

  <!-- left card · text column -->
  <text x="92" y="234" font-size="15" class="acc" font-weight="600" letter-spacing="0.5">任务级记录</text>
  <text x="92" y="282" font-size="29" class="h2">记录动作。</text>
  <text x="92" y="318" font-size="29" class="h2">理解意图。</text>
  <text x="92" y="356" font-size="14.5" class="gray">Pears 关注任务如何完成，</text>
  <text x="92" y="378" font-size="14.5" class="gray">以及每一步为什么存在。</text>

  <!-- 128 task-events chip -->
  <rect x="92" y="458" width="174" height="50" rx="12" fill="#FFFFFF" filter="url(#soft2)"/>
  <text x="110" y="491" font-size="24" class="accb">128</text>
  <text x="157" y="490" font-size="14" font-weight="600" fill="#42424A">个任务事件</text>

  <text x="92" y="552" font-size="18.5" class="b">不是录屏。</text>
  <text x="92" y="578" font-size="18.5" class="b">是结构化的工作证据。</text>

  <!-- ===== white app mock (inside left card) — nudged down for balance ===== -->
  <g transform="translate(0,12)">
    <rect x="348" y="206" width="248" height="392" rx="16" fill="#FFFFFF" filter="url(#soft2)"/>
    <use href="#pear" x="362" y="227" width="15" height="17"/>
    <text x="386" y="240" font-size="14" class="b">Pears</text>
    <text x="430" y="240" font-size="11.5" class="faint">you.@studio.com</text>
    <text x="580" y="234" font-size="10" class="faint" text-anchor="end">切换</text>
    <text x="580" y="247" font-size="10" class="faint" text-anchor="end">设置</text>
    <text x="364" y="274" font-size="11" class="faint">正在记录</text>
    <text x="364" y="294" font-size="15" class="b">视频数据追踪</text>
    <!-- captured-events box -->
    <rect x="364" y="308" width="216" height="48" rx="10" fill="#E8EDE9"/>
    <text x="380" y="338" font-size="11" class="gray">已捕获事件（合计）</text>
    <text x="564" y="342" font-size="23" class="accb" text-anchor="end">128</text>
    <text x="364" y="380" font-size="10.5" class="faint">各站点捕获数（为什么记录了什么）</text>
    <!-- row 1 -->
    <circle cx="372" cy="402" r="4" fill="#E8554A"/>
    <text x="386" y="406" font-size="12" fill="#3A3A40">youtube.com</text>
    <rect x="470" y="395" width="52" height="16" rx="4" fill="#E1ECE5"/>
    <text x="496" y="407" font-size="9.5" class="acc" text-anchor="middle">视频平台</text>
    <text x="580" y="407" font-size="12.5" font-weight="600" text-anchor="end">64</text>
    <line x1="364" y1="422" x2="580" y2="422" stroke="#E7EBE8" stroke-width="1"/>
    <!-- row 2 -->
    <circle cx="372" cy="442" r="4" fill="#E8554A"/>
    <text x="386" y="446" font-size="12" fill="#3A3A40">tiktok.com</text>
    <rect x="455" y="435" width="52" height="16" rx="4" fill="#E1ECE5"/>
    <text x="481" y="447" font-size="9.5" class="acc" text-anchor="middle">视频平台</text>
    <text x="580" y="447" font-size="12.5" font-weight="600" text-anchor="end">41</text>
    <line x1="364" y1="462" x2="580" y2="462" stroke="#E7EBE8" stroke-width="1"/>
    <!-- row 3 -->
    <circle cx="372" cy="482" r="4" fill="#E8554A"/>
    <text x="386" y="486" font-size="12" fill="#3A3A40">docs.google.com</text>
    <rect x="500" y="475" width="38" height="16" rx="4" fill="#E4EBF5"/>
    <text x="519" y="487" font-size="9.5" fill="#3E66B0" text-anchor="middle">文档</text>
    <text x="580" y="487" font-size="12.5" font-weight="600" text-anchor="end">23</text>
    <!-- stop button -->
    <rect x="364" y="506" width="216" height="34" rx="9" fill="#F2CCC9" stroke="#E7A39C" stroke-width="1"/>
    <text x="472" y="528" font-size="13" font-weight="600" fill="#C9483C" text-anchor="middle">停止记录</text>
    <text x="472" y="562" font-size="10" fill="#AEB2AF" text-anchor="middle">v0.4.0</text>
  </g>

  <!-- ===== RIGHT CARD (white) ===== -->
  <rect x="644" y="188" width="572" height="484" rx="22" fill="#FFFFFF" filter="url(#soft)"/>
  <text x="676" y="236" font-size="20" class="h2">把隐性经验，拆成可理解的上下文。</text>
  <text x="676" y="264" font-size="13.5" class="gray">网站、动作、顺序与成果，在一次示范中被同时看见。</text>

  <!-- 2x2 flow grid -->
  <!-- box 01 -->
  <rect x="676" y="294" width="242" height="116" rx="14" fill="#F3F3F3" stroke="#E5E5E7" stroke-width="1"/>
  <text x="694" y="326" font-size="14" class="acc" font-weight="700" letter-spacing="0.5">01</text>
  <text x="694" y="364" font-size="23" class="h2">浏览</text>
  <text x="694" y="392" font-size="13" class="gray">工作发生在哪里</text>
  <!-- box 02 -->
  <rect x="942" y="294" width="242" height="116" rx="14" fill="#F3F3F3" stroke="#E5E5E7" stroke-width="1"/>
  <text x="960" y="326" font-size="14" class="acc" font-weight="700" letter-spacing="0.5">02</text>
  <text x="960" y="364" font-size="23" class="h2">点击</text>
  <text x="960" y="392" font-size="13" class="gray">用户选择了什么</text>
  <!-- box 03 -->
  <rect x="676" y="432" width="242" height="116" rx="14" fill="#F3F3F3" stroke="#E5E5E7" stroke-width="1"/>
  <text x="694" y="464" font-size="14" class="acc" font-weight="700" letter-spacing="0.5">03</text>
  <text x="694" y="502" font-size="23" class="h2">切换</text>
  <text x="694" y="530" font-size="13" class="gray">信息如何流动</text>
  <!-- box 04 -->
  <rect x="942" y="432" width="242" height="116" rx="14" fill="#F3F3F3" stroke="#E5E5E7" stroke-width="1"/>
  <text x="960" y="464" font-size="14" class="acc" font-weight="700" letter-spacing="0.5">04</text>
  <text x="960" y="502" font-size="23" class="h2">整理</text>
  <text x="960" y="530" font-size="13" class="gray">最终成果长什么样</text>

  <!-- arrows: clockwise loop 01→02→04→03→01 -->
  <line x1="921" y1="352" x2="939" y2="352" stroke="#2A6346" stroke-width="1.8" marker-end="url(#ah)"/>
  <line x1="1063" y1="413" x2="1063" y2="429" stroke="#2A6346" stroke-width="1.8" marker-end="url(#ah)"/>
  <line x1="939" y1="490" x2="921" y2="490" stroke="#2A6346" stroke-width="1.8" marker-end="url(#ah)"/>
  <line x1="797" y1="429" x2="797" y2="413" stroke="#2A6346" stroke-width="1.8" marker-end="url(#ah)"/>

  <!-- bottom banner -->
  <rect x="676" y="576" width="508" height="58" rx="14" fill="#EAEFEB"/>
  <text x="930" y="612" font-size="17" class="accb" text-anchor="middle">动作成为证据。证据还原流程。</text>
</svg>
