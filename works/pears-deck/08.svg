<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" fill="#18181C" font-family="-apple-system, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif">
  <defs>
    <filter id="soft" x="-25%" y="-25%" width="150%" height="150%"><feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#1a2a1e" flood-opacity="0.05"/></filter>
    <filter id="soft2" x="-25%" y="-25%" width="150%" height="150%"><feDropShadow dx="0" dy="4" stdDeviation="9" flood-color="#16161a" flood-opacity="0.06"/></filter>
    <filter id="lap" x="-15%" y="-15%" width="130%" height="150%"><feDropShadow dx="0" dy="16" stdDeviation="30" flood-color="#2a2a1e" flood-opacity="0.16"/></filter>
    <style>
      .h1{ font-weight:800; stroke:#18181C; stroke-width:0.7; }
      .h2{ font-weight:800; stroke:#18181C; stroke-width:0.5; }
      .b { font-weight:800; stroke:#18181C; stroke-width:0.3; }
      .acc{ fill:#2A6346; } .accb{ fill:#2A6346; font-weight:800; stroke:#2A6346; stroke-width:0.4; }
      .gray{ fill:#76767C; } .faint{ fill:#9A9AA0; } .tag{ fill:#3E8259; } .ui{ fill:#4A4A50; } .uin{ fill:#8A8A90; }
    </style>
    <symbol id="pear" viewBox="0 0 100 120">
      <ellipse cx="65" cy="25" rx="11" ry="6" fill="#7C9A45" transform="rotate(-32 65 25)"/>
      <path d="M50,30 C50,22 52,17 57,13" fill="none" stroke="#6E7B3A" stroke-width="4.6" stroke-linecap="round"/>
      <ellipse cx="50" cy="48" rx="18" ry="21" fill="#A8B854"/>
      <ellipse cx="50" cy="84" rx="34" ry="30" fill="#A8B854"/>
    </symbol>
  </defs>
  <rect width="1280" height="720" fill="#EFECE6"/>

  <!-- header -->
  <use href="#pear" x="58" y="40" width="30" height="34"/>
  <text x="104" y="66" font-size="28" class="b">Pears</text>
  <text x="200" y="66" font-size="20" class="gray">AI Agent</text>
  <text x="1216" y="60" font-size="17" class="gray" text-anchor="end" letter-spacing="0.3">Agent 构建</text>

  <!-- ===== left column ===== -->
  <!-- headline two lines -->
  <text x="62" y="128" font-size="44" class="h1" letter-spacing="-0.5">拍板之后，</text>
  <text x="62" y="180" font-size="44" class="h1" letter-spacing="-0.5">工作流开始成为 Agent。</text>

  <!-- bold lead -->
  <text x="64" y="272" font-size="20" class="b">不是再写一遍需求。</text>

  <!-- gray paragraph -->
  <text x="64" y="302" font-size="14" class="gray">Pears 把确认后的目标、数据源、步骤与边界，</text>
  <text x="64" y="324" font-size="14" class="gray">整理成编码智能体能够直接理解的构建上下文。</text>
  <text x="64" y="346" font-size="14" class="gray">从产品决策到工程实现，不再重新翻译一次。</text>

  <!-- list items -->
  <!-- PRD -->
  <rect x="64" y="394" width="56" height="28" rx="6" fill="#ECECEE"/>
  <text x="92" y="412" font-size="11" class="ui" font-weight="700" text-anchor="middle" letter-spacing="0.5">PRD</text>
  <text x="136" y="406" font-size="19" class="b">产品定义</text>
  <text x="136" y="427" font-size="13" class="gray">目标、体验与边界</text>
  <!-- JSON -->
  <rect x="64" y="456" width="56" height="28" rx="6" fill="#ECECEE"/>
  <text x="92" y="474" font-size="11" class="ui" font-weight="700" text-anchor="middle" letter-spacing="0.5">JSON</text>
  <text x="136" y="468" font-size="19" class="b">机器契约</text>
  <text x="136" y="489" font-size="13" class="gray">结构化工作流与参数</text>
  <!-- BUILD -->
  <rect x="64" y="518" width="56" height="28" rx="6" fill="#ECECEE"/>
  <text x="92" y="536" font-size="10" class="ui" font-weight="700" text-anchor="middle" letter-spacing="0.5">BUILD</text>
  <text x="136" y="530" font-size="19" class="b">构建说明</text>
  <text x="136" y="551" font-size="13" class="gray">运行方式与人机协作</text>

  <!-- divider + closing lines -->
  <line x1="64" y1="608" x2="464" y2="608" stroke="rgba(11,11,14,.16)" stroke-width="1"/>
  <text x="64" y="640" font-size="17" class="b">不是交付描述。</text>
  <text x="64" y="666" font-size="17" class="b">是交付可执行的上下文。</text>

  <!-- ===== iMac (right) ===== -->
  <!-- foot / base -->
  <g filter="url(#lap)">
    <rect x="858" y="656" width="64" height="40" fill="#BFD3B4"/>
    <path d="M820,696 Q820,700 826,700 L954,700 Q960,700 960,696 L956,690 L824,690 Z" fill="#AFC8A4"/>
    <!-- neck -->
    <path d="M860,624 L920,624 L922,656 L858,656 Z" fill="#B6CDA9"/>
  </g>
  <!-- screen panel -->
  <g filter="url(#lap)">
    <rect x="528" y="130" width="724" height="498" rx="16" fill="#BCD3AF"/>
  </g>
  <rect x="528" y="130" width="724" height="498" rx="16" fill="#C2D7B5"/>
  <!-- inner bezel -->
  <rect x="542" y="144" width="696" height="448" rx="6" fill="#17171B"/>
  <circle cx="890" cy="138" r="2.4" fill="#2E3B2C"/>
  <!-- chin -->
  <rect x="528" y="600" width="724" height="28" rx="0" fill="#B0C8A2" opacity="0"/>

  <!-- ===== screen UI ===== -->
  <g transform="translate(550,152)">
    <clipPath id="scr"><rect x="0" y="0" width="680" height="432" rx="4"/></clipPath>
    <g clip-path="url(#scr)">
      <rect x="0" y="0" width="680" height="432" fill="#FFFFFF"/>

      <!-- top: kicker + title + pills -->
      <text x="20" y="26" font-size="7.6" class="uin" letter-spacing="0.6">P4 · CLAUDE CODE BUILD PACKAGE</text>
      <text x="20" y="46" font-size="15" class="b">Claude Code 构建包</text>
      <rect x="556" y="14" width="56" height="16" rx="8" fill="#E1ECE5"/>
      <text x="584" y="25.5" font-size="8" class="tag" text-anchor="middle">已生成构建包</text>
      <rect x="618" y="14" width="48" height="16" rx="8" fill="#E1ECE5"/>
      <text x="642" y="25.5" font-size="8" class="tag" text-anchor="middle">已保存定稿</text>

      <!-- descriptive paragraph -->
      <text x="20" y="66" font-size="8.4" class="gray">这个 Agent 会每天围绕已确认的垂直赛道，自动收集 TikTok、YouTube、抖音等内容数据，按观看次数、互动次数和互动率</text>
      <text x="20" y="79" font-size="8.4" class="gray">生成当天可用的每日日榜，并在关键口径和发布前保留人工确认。</text>

      <!-- stat chips row -->
      <g>
        <rect x="20" y="92" width="120" height="34" rx="6" fill="#EAF2EC"/>
        <text x="30" y="106" font-size="7.4" class="uin">工作流</text>
        <text x="30" y="119" font-size="10.5" class="b">5 步</text>

        <rect x="148" y="92" width="120" height="34" rx="6" fill="#E7EEF6"/>
        <text x="158" y="106" font-size="7.4" class="uin">数据源</text>
        <text x="158" y="119" font-size="10.5" class="b">3 个</text>

        <rect x="276" y="92" width="120" height="34" rx="6" fill="#F0F0F2"/>
        <text x="286" y="106" font-size="7.4" class="uin">输出结构</text>
        <text x="286" y="119" font-size="10.5" class="b">11 列</text>

        <rect x="404" y="92" width="128" height="34" rx="6" fill="#F6F0E4"/>
        <text x="414" y="106" font-size="7.4" class="uin">触发方式</text>
        <text x="414" y="119" font-size="10.5" class="b">每天固定时间</text>

        <rect x="540" y="92" width="124" height="34" rx="6" fill="#EAF2EC"/>
        <text x="550" y="106" font-size="7.4" class="uin">产出去向</text>
        <text x="550" y="119" font-size="9.4" class="b">表格工具中的每日日榜表和…</text>
      </g>

      <!-- 涉及网站 row -->
      <text x="20" y="148" font-size="7.6" class="uin">涉及网站</text>
      <g font-size="7.6">
        <!-- chip helper laid out manually -->
        <rect x="20" y="156" width="116" height="16" rx="4" fill="#F4F4F6"/>
        <circle cx="31" cy="164" r="4.4" fill="#E4E4E8"/><text x="31" y="166.6" font-size="6.4" class="uin" text-anchor="middle">T</text>
        <text x="40" y="167" class="ui">tiktok.com</text>
        <text x="93" y="167" font-size="6.6" class="tag">视频平台</text>
        <text x="129" y="167" font-size="6.6" class="uin" text-anchor="end">121</text>

        <rect x="142" y="156" width="166" height="16" rx="4" fill="#F4F4F6"/>
        <circle cx="153" cy="164" r="4.4" fill="#E4E4E8"/><text x="153" y="166.6" font-size="6.4" class="uin" text-anchor="middle">P</text>
        <text x="162" y="167" class="ui">pear-work-web.vercel.app</text>
        <text x="276" y="167" font-size="6.6" class="uin">未知</text>
        <text x="301" y="167" font-size="6.6" class="uin" text-anchor="end">25</text>

        <rect x="314" y="156" width="110" height="16" rx="4" fill="#F4F4F6"/>
        <circle cx="325" cy="164" r="4.4" fill="#E4E4E8"/><text x="325" y="166.6" font-size="6.4" class="uin" text-anchor="middle">G</text>
        <text x="334" y="167" class="ui">google.com</text>
        <text x="388" y="167" font-size="6.6" class="uin">搜索</text>
        <text x="417" y="167" font-size="6.6" class="uin" text-anchor="end">21</text>

        <rect x="430" y="156" width="110" height="16" rx="4" fill="#F4F4F6"/>
        <circle cx="441" cy="164" r="4.4" fill="#E4E4E8"/><text x="441" y="166.6" font-size="6.4" class="uin" text-anchor="middle">Y</text>
        <text x="450" y="167" class="ui">youtube.com</text>
        <text x="508" y="167" font-size="6.6" class="uin">视频</text>
        <text x="533" y="167" font-size="6.6" class="uin" text-anchor="end">19</text>

        <rect x="546" y="156" width="108" height="16" rx="4" fill="#F4F4F6"/>
        <circle cx="557" cy="164" r="4.4" fill="#E4E4E8"/><text x="557" y="166.6" font-size="6.4" class="uin" text-anchor="middle">D</text>
        <text x="566" y="167" class="ui">douyin.com</text>
        <text x="620" y="167" font-size="6.6" class="uin">视频</text>
        <text x="647" y="167" font-size="6.6" class="uin" text-anchor="end">8</text>

        <rect x="20" y="176" width="130" height="16" rx="4" fill="#F4F4F6"/>
        <circle cx="31" cy="184" r="4.4" fill="#E4E4E8"/><text x="31" y="186.6" font-size="6.4" class="uin" text-anchor="middle">D</text>
        <text x="40" y="187" class="ui">docs.google.com</text>
        <text x="116" y="187" font-size="6.6" class="uin">文档</text>
        <text x="143" y="187" font-size="6.6" class="uin" text-anchor="end">4</text>

        <rect x="156" y="176" width="150" height="16" rx="4" fill="#F4F4F6"/>
        <circle cx="167" cy="184" r="4.4" fill="#E4E4E8"/><text x="167" y="186.6" font-size="6.4" class="uin" text-anchor="middle">X</text>
        <text x="176" y="187" class="ui">xiaohongshu.com</text>
        <text x="252" y="187" font-size="6.6" class="tag">社交电商</text>
        <text x="299" y="187" font-size="6.6" class="uin" text-anchor="end">4</text>

        <rect x="312" y="176" width="132" height="16" rx="4" fill="#F4F4F6"/>
        <circle cx="323" cy="184" r="4.4" fill="#E4E4E8"/><text x="323" y="186.6" font-size="6.4" class="uin" text-anchor="middle">T</text>
        <text x="332" y="187" class="ui">tiktokacademy.com</text>
        <text x="437" y="187" font-size="6.6" class="uin" text-anchor="end">3</text>
      </g>

      <!-- 构建包内容 -->
      <text x="20" y="214" font-size="11" class="b">构建包内容</text>
      <text x="20" y="228" font-size="7.4" class="uin">每一节都会进入 Claude Code 的构建上下文。</text>
      <rect x="478" y="204" width="100" height="16" rx="4" fill="#FFFFFF" stroke="#E2E2E4" stroke-width="1"/>
      <text x="528" y="215" font-size="7.4" class="ui" text-anchor="middle">＋ 重新生成构建包</text>

      <!-- left stepper list -->
      <g font-size="8.4">
        <rect x="20" y="238" width="118" height="20" rx="5" fill="#EAF4EC" stroke="#2A6346" stroke-width="1"/>
        <circle cx="33" cy="248" r="2.4" fill="#2A6346"/><text x="42" y="251" class="acc">目标</text>
        <text x="32" y="278" class="ui">数据源</text>
        <text x="32" y="300" class="ui">需要的授权与参数</text>
        <text x="32" y="322" class="ui">Agent 蓝图</text>
        <text x="32" y="344" class="ui">输出表格</text>
        <text x="32" y="366" class="ui">产出去向</text>
        <circle cx="25" cy="275" r="2" fill="#C8C8CC"/>
        <circle cx="25" cy="297" r="2" fill="#C8C8CC"/>
        <circle cx="25" cy="319" r="2" fill="#C8C8CC"/>
        <circle cx="25" cy="341" r="2" fill="#C8C8CC"/>
        <circle cx="25" cy="363" r="2" fill="#C8C8CC"/>
      </g>

      <!-- divider between list and content pane -->
      <line x1="150" y1="236" x2="150" y2="392" stroke="#ECECEE" stroke-width="1"/>

      <!-- right content pane -->
      <!-- 1 BACKGROUND -->
      <rect x="166" y="240" width="14" height="14" rx="3" fill="#EEEEF0"/>
      <text x="173" y="250.5" font-size="8" class="ui" text-anchor="middle">1</text>
      <text x="188" y="247" font-size="7.4" class="uin" letter-spacing="0.4">BACKGROUND</text>
      <text x="252" y="247" font-size="9" class="b">目标</text>
      <text x="500" y="247" font-size="7" class="uin">＋ AI</text>
      <text x="528" y="247" font-size="7" class="uin">✎ 编辑</text>
      <text x="560" y="247" font-size="7" class="uin">…</text>
      <text x="166" y="263" font-size="7.6" class="gray">围绕已确认的垂直赛道，每日自动汇总 TikTok、YouTube、抖音等内容数据，生成按</text>
      <text x="166" y="275" font-size="7.6" class="gray">观看次数、互动次数和互动率排序的每日日榜，并基于高互动率内容产出可人工确认</text>
      <text x="166" y="287" font-size="7.6" class="gray">的小红书文案草稿。</text>

      <!-- 2 TOOLS -->
      <rect x="166" y="306" width="14" height="14" rx="3" fill="#EEEEF0"/>
      <text x="173" y="316.5" font-size="8" class="ui" text-anchor="middle">2</text>
      <text x="188" y="313" font-size="7.4" class="uin" letter-spacing="0.4">TOOLS</text>
      <text x="222" y="313" font-size="9" class="b">数据源</text>
      <text x="500" y="313" font-size="7" class="uin">＋ AI</text>
      <text x="528" y="313" font-size="7" class="uin">✎ 编辑</text>
      <text x="560" y="313" font-size="7" class="uin">…</text>
      <text x="166" y="332" font-size="8.4" class="b">TikTok</text>
      <text x="206" y="332" font-size="7.6" class="ui">· 已确认的垂直赛道目标账号或话题</text>
      <rect x="404" y="324" width="48" height="13" rx="6.5" fill="#E1ECE5"/>
      <text x="428" y="333" font-size="6.8" class="tag" text-anchor="middle">视频平台</text>
      <text x="166" y="345" font-size="6.8" class="uin">观看次数、互动次数、互动率</text>

      <!-- right delivery panel -->
      <line x1="468" y1="296" x2="468" y2="392" stroke="#ECECEE" stroke-width="1"/>
      <text x="482" y="248" font-size="9" class="b">交付到编程软件</text>
      <!-- primary dark button -->
      <rect x="482" y="258" width="180" height="22" rx="6" fill="#1F1F24"/>
      <text x="572" y="272.5" font-size="9" fill="#FFFFFF" text-anchor="middle">发送到 Claude Code</text>
      <!-- secondary -->
      <rect x="482" y="286" width="180" height="20" rx="6" fill="#FFFFFF" stroke="#E2E2E4" stroke-width="1"/>
      <text x="572" y="299" font-size="8.4" class="ui" text-anchor="middle">只在 VS Code 打开</text>
      <!-- prd.json card -->
      <rect x="482" y="316" width="180" height="68" rx="7" fill="#FBFBFC" stroke="#E6E6E8" stroke-width="1"/>
      <rect x="494" y="328" width="22" height="14" rx="3" fill="#ECECEE"/>
      <text x="505" y="338" font-size="6.6" class="ui" text-anchor="middle">JSON</text>
      <text x="524" y="338" font-size="8.6" class="b">prd.json</text>
      <text x="494" y="354" font-size="7" class="gray">机器可读契约，Claude Code 按这个结构实</text>
      <text x="494" y="365" font-size="7" class="gray">现工作流。</text>
      <text x="494" y="380" font-size="7.4" class="acc">复制</text>
      <text x="524" y="380" font-size="7.4" class="acc">下载</text>
    </g>
  </g>
</svg>
