<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" fill="#18181C" font-family="-apple-system, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif">
  <defs>
    <filter id="soft" x="-25%" y="-25%" width="150%" height="150%"><feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#1a2a1e" flood-opacity="0.05"/></filter>
    <filter id="soft2" x="-25%" y="-25%" width="150%" height="150%"><feDropShadow dx="0" dy="4" stdDeviation="9" flood-color="#16161a" flood-opacity="0.06"/></filter>
    <filter id="lap" x="-15%" y="-15%" width="130%" height="150%"><feDropShadow dx="0" dy="16" stdDeviation="30" flood-color="#2a2a1e" flood-opacity="0.16"/></filter>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,1 L9,5 L0,9" fill="none" stroke="#2A6346" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <style>
      .h1{ font-weight:800; stroke:#18181C; stroke-width:0.7; }
      .h2{ font-weight:800; stroke:#18181C; stroke-width:0.5; }
      .b { font-weight:800; stroke:#18181C; stroke-width:0.3; }
      .acc{ fill:#2A6346; } .accb{ fill:#2A6346; font-weight:800; stroke:#2A6346; stroke-width:0.4; }
      .gray{ fill:#76767C; } .faint{ fill:#9A9AA0; } .tag{ fill:#3E8259; } .ui{ fill:#4A4A50; } .uin{ fill:#8A8A90; }
    </style>
    <symbol id="pear" viewBox="0 0 100 120">
      <ellipse cx="65" cy="25" rx="11" ry="6" fill="#7C9A45" transform="rotate(-32 65 25)"/>
      <path d="M50,30 C50,22 52,17 57,13" fill="none" stroke="#6E7B3A" stroke-width="4.6" stroke-linecap="round"/>
      <ellipse cx="50" cy="48" rx="18" ry="21" fill="#A8B854"/>
      <ellipse cx="50" cy="84" rx="34" ry="30" fill="#A8B854"/>
    </symbol>
  </defs>
  <rect width="1280" height="720" fill="#EFECE6"/>

  <!-- ===== header ===== -->
  <use href="#pear" x="58" y="40" width="30" height="34"/>
  <text x="104" y="66" font-size="28" class="b">Pears</text>
  <text x="200" y="66" font-size="20" class="gray">AI Agent</text>
  <text x="1216" y="60" font-size="17" class="gray" text-anchor="end" letter-spacing="0.3">产品洞察</text>

  <!-- ===== centered headline (two lines) ===== -->
  <text x="640" y="116" font-size="40" class="h1 acc" text-anchor="middle" letter-spacing="-0.5">软件越来越容易生成。</text>
  <text x="640" y="168" font-size="40" class="h1" text-anchor="middle" letter-spacing="-0.5">真正难的，是把工作说清楚。</text>
  <!-- centered subtitle -->
  <text x="640" y="212" font-size="16" class="gray" text-anchor="middle">熟悉的工作，未必能被一句 Prompt 完整描述。</text>

  <!-- ===== MacBook (top portion only, cropped at slide bottom) ===== -->
  <!-- device body (sage-green family) -->
  <g filter="url(#lap)">
    <rect x="176" y="280" width="928" height="460" rx="26" fill="#C9CF8E"/>
  </g>
  <!-- thin green edge highlight -->
  <rect x="176" y="280" width="928" height="460" rx="26" fill="none" stroke="#A7B86C" stroke-width="1.2"/>
  <!-- dark bezel -->
  <rect x="196" y="300" width="888" height="440" rx="14" fill="#17171B"/>
  <rect x="196" y="300" width="888" height="440" rx="14" fill="none" stroke="#3A4A38" stroke-width="1" opacity="0.5"/>
  <!-- camera dot -->
  <circle cx="640" cy="313" r="2.4" fill="#3A3A3E"/>

  <!-- ===== screen content: three cards on faint ground ===== -->
  <g transform="translate(208,324)">
    <clipPath id="scr"><rect x="0" y="0" width="864" height="416" rx="4"/></clipPath>
    <g clip-path="url(#scr)">
      <!-- faint ground -->
      <rect x="0" y="0" width="864" height="416" fill="#EEF1EC"/>

      <!-- browser tab bar -->
      <rect x="0" y="0" width="864" height="24" fill="#E5E8E2"/>
      <circle cx="18" cy="12" r="3.4" fill="#FF5F57"/><circle cx="31" cy="12" r="3.4" fill="#FEBC2E"/><circle cx="44" cy="12" r="3.4" fill="#28C840"/>
      <rect x="76" y="3.5" width="170" height="18" rx="6" fill="#FBFCFA"/>
      <use href="#pear" x="86" y="6.5" width="11" height="12"/>
      <text x="102" y="16.5" font-size="9.5" class="ui">Pears</text>
      <text x="236" y="16.5" font-size="9.5" class="uin" text-anchor="end">✕</text>
      <text x="260" y="16.5" font-size="12" class="uin">+</text>
      <text x="850" y="16.5" font-size="9.5" class="uin" text-anchor="end">⋮</text>

      <!-- address bar -->
      <rect x="0" y="24" width="864" height="28" fill="#F1F2EE"/>
      <text x="16" y="42" font-size="11" class="uin">←</text>
      <text x="34" y="42" font-size="11" class="uin">↻</text>
      <rect x="56" y="29" width="640" height="18" rx="9" fill="#FFFFFF" stroke="#E2E4DE" stroke-width="1"/>
      <text x="70" y="42" font-size="9.5" class="uin">pear-work-web.netlify.app</text>
      <text x="848" y="42" font-size="9.5" class="uin" text-anchor="end">☆  ⬇  ⋮</text>

      <!-- app top bar -->
      <text x="16" y="74" font-size="9.5" class="ui">☐　智能体</text>
      <rect x="694" y="64" width="92" height="16" rx="8" fill="#F4F5F1" stroke="#E2E5DD" stroke-width="1"/>
      <text x="740" y="75.5" font-size="8" class="uin" text-anchor="middle">获取 Pear 插件 · 来宾版</text>
      <text x="848" y="75.5" font-size="8" class="uin" text-anchor="end">新手引导　v0.4.2</text>

      <!-- ===== three cards ===== -->
      <!-- Card 1 (white) -->
      <rect x="56" y="104" width="226" height="248" rx="14" fill="#FFFFFF" filter="url(#soft2)"/>
      <rect x="80" y="128" width="40" height="40" rx="10" fill="#EFEFEF"/>
      <rect x="90" y="142" width="20" height="2.6" rx="1.3" fill="#9A9AA0"/>
      <rect x="90" y="148" width="20" height="2.6" rx="1.3" fill="#9A9AA0"/>
      <rect x="90" y="154" width="14" height="2.6" rx="1.3" fill="#9A9AA0"/>
      <text x="80" y="200" font-size="11" class="gray">熟悉的工作</text>
      <text x="80" y="232" font-size="22" class="h2">每天都在做，</text>
      <text x="80" y="262" font-size="22" class="h2">却很难说清。</text>
      <text x="80" y="300" font-size="12.5" class="gray">判断藏在经验里。</text>

      <!-- Card 2 (white) -->
      <rect x="318" y="104" width="226" height="248" rx="14" fill="#FFFFFF" filter="url(#soft2)"/>
      <rect x="342" y="128" width="40" height="40" rx="10" fill="#EFEFEF"/>
      <text x="362" y="156" font-size="20" fill="#9A9AA0" text-anchor="middle" font-weight="700">“”</text>
      <text x="342" y="200" font-size="11" class="gray">一句 Prompt</text>
      <text x="342" y="232" font-size="22" class="h2">目标说得出，</text>
      <text x="342" y="262" font-size="22" class="h2">过程会丢失。</text>
      <text x="342" y="300" font-size="12.5" class="gray">顺序、来源与例外被压扁。</text>

      <!-- Card 3 (light green tint) -->
      <rect x="580" y="104" width="226" height="248" rx="14" fill="#DCE8DF"/>
      <!-- chip row: 做 → 懂 → 生 -->
      <circle cx="618" cy="148" r="17" fill="#EAF1EC"/>
      <text x="618" y="153" font-size="13" class="b" text-anchor="middle">做</text>
      <line x1="639" y1="148" x2="657" y2="148" stroke="#2A6346" stroke-width="1.6" marker-end="url(#ah)"/>
      <circle cx="678" cy="148" r="17" fill="#EAF1EC"/>
      <text x="678" y="153" font-size="13" class="b" text-anchor="middle">懂</text>
      <line x1="699" y1="148" x2="717" y2="148" stroke="#2A6346" stroke-width="1.6" marker-end="url(#ah)"/>
      <circle cx="738" cy="148" r="17" fill="#2A6346"/>
      <text x="738" y="153" font-size="13" font-weight="800" fill="#FFFFFF" text-anchor="middle">生</text>
      <text x="604" y="200" font-size="11" class="acc">Pears 的机会</text>
      <text x="604" y="232" font-size="22" class="h2">真正的流程，</text>
      <text x="604" y="262" font-size="22" class="h2">藏在操作里。</text>
      <text x="604" y="300" font-size="12.5" class="gray">示范一次，让 AI 看懂。</text>
    </g>
  </g>
</svg>
