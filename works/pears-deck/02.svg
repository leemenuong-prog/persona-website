<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" fill="#18181C" font-family="-apple-system, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif">
  <defs>
    <filter id="soft" x="-25%" y="-25%" width="150%" height="150%"><feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#1a2a1e" flood-opacity="0.05"/></filter>
    <filter id="soft2" x="-25%" y="-25%" width="150%" height="150%"><feDropShadow dx="0" dy="4" stdDeviation="9" flood-color="#16161a" flood-opacity="0.06"/></filter>
    <filter id="lap" x="-15%" y="-15%" width="130%" height="150%"><feDropShadow dx="0" dy="16" stdDeviation="30" flood-color="#2a2a1e" flood-opacity="0.16"/></filter>
    <style>
      .h1{ font-weight:800; stroke:#18181C; stroke-width:0.7; }
      .h2{ font-weight:800; stroke:#18181C; stroke-width:0.5; }
      .b { font-weight:800; stroke:#18181C; stroke-width:0.3; }
      .acc{ fill:#2A6346; } .accb{ fill:#2A6346; font-weight:800; stroke:#2A6346; stroke-width:0.4; }
      .gray{ fill:#76767C; } .faint{ fill:#9A9AA0; } .tag{ fill:#3E8259; } .ui{ fill:#4A4A50; } .uin{ fill:#8A8A90; }
    </style>
    <symbol id="pear" viewBox="0 0 100 120">
      <ellipse cx="65" cy="25" rx="11" ry="6" fill="#7C9A45" transform="rotate(-32 65 25)"/>
      <path d="M50,30 C50,22 52,17 57,13" fill="none" stroke="#6E7B3A" stroke-width="4.6" stroke-linecap="round"/>
      <ellipse cx="50" cy="48" rx="18" ry="21" fill="#A8B854"/>
      <ellipse cx="50" cy="84" rx="34" ry="30" fill="#A8B854"/>
    </symbol>
  </defs>
  <rect width="1280" height="720" fill="#F5F5F7"/>

  <!-- ===== header ===== -->
  <use href="#pear" x="62" y="40" width="34" height="38"/>
  <text x="112" y="68" font-size="28" class="h2">Pears</text>
  <text x="201" y="68" font-size="28" class="b">Agent</text>

  <!-- ===== left: headline (two lines) ===== -->
  <text x="60" y="252" font-size="64" class="h1" letter-spacing="-1">看你做一遍。</text>
  <text x="60" y="332" font-size="64" class="h1" letter-spacing="-1">剩下的，交给它。</text>

  <!-- subtitle -->
  <text x="62" y="430" font-size="22" class="gray">从真实操作中理解工作，</text>
  <text x="62" y="464" font-size="22" class="gray">把重复流程生成可运行、可成长的 Agent App。</text>

  <!-- dark pill button -->
  <rect x="62" y="510" width="146" height="56" rx="28" fill="#1B1B1F" filter="url(#soft2)"/>
  <text x="135" y="546" font-size="17" font-weight="700" fill="#FFFFFF" text-anchor="middle">查看产品</text>

  <!-- footer -->
  <text x="62" y="652" font-size="17" class="b">产品体验及设计负责人 · Vibe Coding 开发</text>
  <text x="62" y="684" font-size="15" class="faint">Pears v0.4.2 · 2026</text>

  <!-- ===== MacBook (no hand) — landscape screen, ~16:10 ===== -->
  <!-- base / deck (3D wedge: top surface + front edge) -->
  <g filter="url(#lap)">
    <path d="M772,510 L1248,510 L1264,530 L756,530 Z" fill="#DCDB8E"/>
    <path d="M756,530 L1264,530 L1257,541 Q1255,545 1249,545 L771,545 Q765,545 763,541 Z" fill="#CFCE7B"/>
    <path d="M981,530 L1040,530 L1036,537 L985,537 Z" fill="#BCBB6C"/>
  </g>
  <!-- hinge shadow under lid -->
  <rect x="770" y="504" width="480" height="8" rx="2" fill="#101014"/>
  <!-- screen bezel -->
  <rect x="770" y="180" width="480" height="328" rx="13" fill="#17171B"/>
  <circle cx="1010" cy="187" r="2.2" fill="#3A3A3E"/>

  <!-- ===== screen UI (local coords via translate) ===== -->
  <g transform="translate(781,194)">
    <clipPath id="scr"><rect x="0" y="0" width="458" height="300" rx="4"/></clipPath>
    <g clip-path="url(#scr)">
      <rect x="0" y="0" width="458" height="300" fill="#FFFFFF"/>

      <!-- browser tab bar -->
      <rect x="0" y="0" width="458" height="22" fill="#E9E9EC"/>
      <circle cx="14" cy="11" r="3.2" fill="#FF5F57"/><circle cx="25" cy="11" r="3.2" fill="#FEBC2E"/><circle cx="36" cy="11" r="3.2" fill="#28C840"/>
      <path d="M48,9 l4,4 l4,-4" fill="none" stroke="#9A9A9E" stroke-width="1"/>
      <rect x="68" y="3" width="150" height="17" rx="5" fill="#FCFCFD"/>
      <use href="#pear" x="76" y="6" width="10" height="11"/>
      <text x="90" y="15" font-size="9" class="ui">Pears</text>
      <text x="208" y="15" font-size="9" class="uin" text-anchor="end">✕</text>
      <text x="230" y="15" font-size="11" class="uin">+</text>
      <text x="446" y="15" font-size="9" class="uin" text-anchor="end">⋮</text>

      <!-- address bar -->
      <rect x="0" y="22" width="458" height="24" fill="#F3F3F5"/>
      <text x="14" y="38" font-size="11" class="uin">←</text>
      <text x="30" y="38" font-size="11" class="uin">→</text>
      <text x="46" y="38" font-size="10" class="uin">↻</text>
      <rect x="62" y="25" width="336" height="16" rx="8" fill="#FFFFFF" stroke="#E4E4E7" stroke-width="1"/>
      <text x="74" y="37" font-size="8.5" class="uin">pear-work-web.netlify.app</text>
      <text x="446" y="37" font-size="9" class="uin" text-anchor="end">☆  ⬇  ⋮</text>

      <!-- app top bar -->
      <text x="14" y="59" font-size="9" class="ui">▦　▤</text>
      <g text-anchor="end">
        <rect x="254" y="51" width="98" height="14" rx="7" fill="#F2F2F4"/>
        <text x="303" y="61" font-size="7.6" class="uin" text-anchor="middle">获取 Pear 插件 · 来宾版</text>
        <rect x="358" y="51" width="44" height="14" rx="7" fill="#F2F2F4"/>
        <text x="380" y="61" font-size="7.6" class="uin" text-anchor="middle">新手引导</text>
        <rect x="408" y="51" width="36" height="14" rx="7" fill="#F2F2F4"/>
        <text x="426" y="61" font-size="7.6" class="uin" text-anchor="middle">v0.4.2</text>
      </g>
      <line x1="0" y1="78" x2="458" y2="78" stroke="#ECECEE" stroke-width="1"/>

      <!-- hero: pear + headline -->
      <use href="#pear" x="86" y="88" width="27" height="30"/>
      <text x="122" y="112" font-size="19" class="h2">把重复工作交给 Pears</text>

      <!-- sub -->
      <text x="229" y="140" font-size="9.5" class="gray" text-anchor="middle">Pears 会学习你的重复流程，沉淀成可运行、可持续优化的工作台。</text>

      <!-- two-column rounded box -->
      <rect x="40" y="164" width="378" height="94" rx="12" fill="#FFFFFF" stroke="#EAEAEC" stroke-width="1" filter="url(#soft)"/>
      <line x1="229" y1="176" x2="229" y2="240" stroke="#EFEFF1" stroke-width="1"/>

      <!-- left col: 工作流描述 -->
      <text x="58" y="182" font-size="9" class="b">工作流描述</text>
      <text x="58" y="197" font-size="7.9" class="uin">例如：每两天去 YouTube / TikTok 抓取和</text>
      <text x="58" y="208" font-size="7.9" class="uin">对标账号的最新视频数据，填进一张追</text>
      <text x="58" y="219" font-size="7.9" class="uin">踪表。</text>
      <line x1="58" y1="234" x2="213" y2="234" stroke="#EFEFF1" stroke-width="1"/>
      <text x="58" y="248" font-size="7.4" class="uin">🔗 联网搜索</text>
      <text x="212" y="248" font-size="7.4" class="uin" text-anchor="end">可拖文件进来</text>

      <!-- right col: 成果 -->
      <text x="247" y="182" font-size="9" class="b">成果</text>
      <text x="247" y="197" font-size="7.9" class="uin">+ 加示例 想要的成果，或拖入 / 加</text>
      <text x="247" y="208" font-size="7.9" class="uin">示例，例如：按日期追加的视频追</text>
      <text x="247" y="219" font-size="7.9" class="uin">踪表</text>

      <!-- bottom row: 直接分析 + button -->
      <text x="58" y="278" font-size="8.5" class="uin">直接分析</text>
      <rect x="320" y="266" width="98" height="20" rx="10" fill="#2B2B30"/>
      <text x="369" y="280" font-size="8.5" fill="#FFFFFF" text-anchor="middle">→ 开始分析</text>

      <!-- very bottom centered -->
      <text x="229" y="294" font-size="8" class="acc" text-anchor="middle">∨ 我的 Pears</text>
    </g>
  </g>
</svg>
