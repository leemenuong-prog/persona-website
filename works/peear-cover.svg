<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" role="img" aria-label="Peear — Career Agent">
  <rect width="1280" height="720" fill="#0047AB"/>
  <!-- data-bars skyline (条) — the .IAM. rhythm; period = deeper blue (跳色) -->
  <g>
    <rect x="498" y="180" width="26" height="120" fill="#0b0b0e"/>
    <rect x="538" y="150" width="26" height="150" fill="#0b0b0e"/>
    <rect x="578" y="210" width="26" height="90"  fill="#0b0b0e"/>
    <rect x="618" y="135" width="26" height="165" fill="#0b0b0e"/>
    <rect x="658" y="200" width="26" height="100" fill="#0b0b0e"/>
    <rect x="698" y="165" width="26" height="135" fill="#0b0b0e"/>
    <rect x="738" y="190" width="26" height="110" fill="#0b0b0e"/>
    <rect x="778" y="284" width="16" height="16"  fill="#002a66"/>
  </g>
  <!-- wordmark — paper letters, square period in deeper blue (accent on the dot only) -->
  <text x="640" y="470" text-anchor="middle"
