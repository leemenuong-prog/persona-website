        font-size="23" letter-spacing="7" fill="#efece6" fill-opacity="0.82">CAREER AGENT · MEMO → ASSET · STAR ENGINE</text>
  <text x="60" y="74"
        font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace"
        font-size="22" letter-spacing="5" fill="#efece6" fill-opacity="0.72">W·03 · AI PRODUCT · 2025</text>
  <text x="60" y="676"
        font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace"
        font-size="21" letter-spacing="4" fill="#efece6" fill-opacity="0.6">LIVE · pear-agent.vercel.app</text>
